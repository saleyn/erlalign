name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & publish GitHub release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"

      - name: Cache rebar3 packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/rebar3
          key: rebar3-${{ hashFiles('rebar.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-release-${{ hashFiles('rebar.lock') }}

      - name: Get rebar3
        run: |
          mkdir -p ~/bin
          curl -fsSL https://s3.amazonaws.com/rebar3/rebar3 -o ~/bin/rebar3
          chmod +x ~/bin/rebar3
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Compile
        run: rebar3 compile

      - name: Run tests
        run: rebar3 eunit

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "ErlAlign v${{ github.ref_name }}"
          generate_release_notes: true
