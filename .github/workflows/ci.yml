name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: OTP ${{ matrix.otp }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        otp: ["27", "28"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}

      - name: Cache rebar3 packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/rebar3
          key: rebar3-${{ matrix.otp }}-${{ hashFiles('rebar.lock') }}
          restore-keys: rebar3-${{ matrix.otp }}-

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ matrix.otp }}-${{ hashFiles('rebar.lock') }}
          restore-keys: build-${{ matrix.otp }}-

      - name: Get rebar3
        run: |
          mkdir -p ~/bin
          curl -fsSL https://s3.amazonaws.com/rebar3/rebar3 -o ~/bin/rebar3
          chmod +x ~/bin/rebar3
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Compile
        run: rebar3 compile

      - name: Run tests
        run: rebar3 eunit

      - name: Generate coverage report
        run: rebar3 covertool generate
        continue-on-error: true

      - name: Generate erlalign escript
        run: make escriptize

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: _build/test/covertool/erlalign.coverage.json
          flags: erlang-otp-${{ matrix.otp }}
        continue-on-error: true
